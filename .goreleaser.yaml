version: 2

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - id: stack-pr
    main: ./cmd/stack-pr
    binary: stack-pr
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/victorhsb/branchless-pr/internal/cli.version={{.Version}}

checksum:
  name_template: checksums.txt

archives:
  - id: stack-pr
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    files:
      - README.md
      - LICENSE

changelog:
  use: github-native

brews:
  - name: stack-pr
    repository:
      owner: victorhsb
      name: homebrew-tap
    directory: Formula
    homepage: https://github.com/victorhsb/branchless-pr
    description: CLI for stacked GitHub PRs
    license: Apache-2.0
    test: |
      system "#{bin}/stack-pr", "version"

# Cosign keyless signing (Github OIDC)
signs:
  - cmd: cosign
    env:
      - COSIGN_YES=true
      - COSIGN_EXPERIMENTAL=1
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
    artifacts: all

# Docker signing (just the image manifest, not each layer)
docker_signs:
  - cmd: cosign
    env:
      - COSIGN_YES=true
      - COSIGN_EXPERIMENTAL=1
    args:
      - "sign"
      - "${artifact}"
    artifacts: manifests

snapshot:
  version_template: "{{.Version}}-next"
