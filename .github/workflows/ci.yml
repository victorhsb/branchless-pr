name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: gofmt check
        run: |
          diff="$(gofmt -l .)"
          if [ -n "$diff" ]; then
            echo "gofmt issues in:"
            echo "$diff"
            exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test ./...
      - name: go test (race detector)
        run: go test -race ./...
      - name: build
        run: go build ./cmd/bpr
